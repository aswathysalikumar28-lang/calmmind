<!DOCTYPE html>
<html>
<head>
    <title>Contact</title>
    <style>
        body {font-family: 'Segoe UI'; background: #f5f5dc; padding: 50px;}
        .container {max-width:700px; margin:auto; background:white; padding:30px; border-radius:15px; box-shadow:0px 10px 25px rgba(0,0,0,0.2);}
        h1 {color:#2c3e50;}
        input, textarea {width:100%; padding:10px; margin:10px 0; border-radius:10px; border:1px solid #ccc;}
        button {padding:12px 25px; background:#6c63ff; color:white; border:none; border-radius:25px; cursor:pointer;}
        button:hover {background:#574fd6;}
        .message {margin-top:15px; font-weight:bold; color:#2c3e50;}
    </style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/responsive.css') }}">
</head>
<body>
<div class="container">
    <h1>Contact Us</h1>
    <form method="POST">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
        <textarea name="feedback" placeholder="Your Feedback" rows="5" required></textarea>
        <button type="submit">Send</button>
    </form>
    {% if message %}
        <div class="message">{{ message }}</div>
    {% endif %}
    <a href="/" style="color:#6c63ff;">Back to Home</a>
</div>
</body>
</html>
