<!DOCTYPE html>
<html>
<head>
    <title>Anxiety Test</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #fddb92, #d1fdff);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .box {
            background: white;
            width: 70%;
            max-width: 600px;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0px 15px 30px rgba(0,0,0,0.2);
            animation: fadeIn 1.5s ease;
        }

        h2 {
            color: #2c3e50;
            margin-bottom: 25px;
            text-align: center;
        }

        p {
            font-size: 18px;
            margin: 15px 0 5px;
        }

        select {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ccc;
            margin-bottom: 20px;
            font-size: 16px;
            transition: all 0.2s ease;
        }

        select:hover {
            border-color: #6c63ff;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #6c63ff;
            color: white;
            font-size: 18px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #574fd6;
            transform: translateY(-3px) scale(1.02);
        }

        .result {
            margin-top: 25px;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            color: #2c3e50;
            animation: popIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(-20px);}
            to {opacity: 1; transform: translateY(0);}
        }

        @keyframes popIn {
            0% {opacity:0; transform: scale(0.5);}
            100% {opacity:1; transform: scale(1);}
        }
    </style>
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/responsive.css') }}">
</head>

<body>

<div class="box">
    <h2>Anxiety Test</h2>

    <form method="POST">
        <p>Do you feel nervous?</p>
        <select name="q1">
            <option value="0">Never</option>
            <option value="1">Sometimes</option>
            <option value="2">Often</option>
        </select>

        <p>Do you overthink?</p>
        <select name="q2">
            <option value="0">Never</option>
            <option value="1">Sometimes</option>
            <option value="2">Often</option>
        </select>

        <p>Do you feel restless?</p>
        <select name="q3">
            <option value="0">Never</option>
            <option value="1">Sometimes</option>
            <option value="2">Often</option>
        </select>

        <button type="submit">Submit</button>
    </form>

    {% if result %}
        <div class="result">{{ result }}</div>
    {% endif %}
</div>

</body>
</html>
